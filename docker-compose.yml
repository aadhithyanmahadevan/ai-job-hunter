services:
  api:
    build: .
    container_name: ai-job-hunter

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/ai_job_hunter

    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: postgres

    restart: always

    environment:
      POSTGRES_DB: ai_job_hunter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: